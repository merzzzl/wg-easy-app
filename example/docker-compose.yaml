services:
  upstream-wg:
    image: ubuntu:24.04
    container_name: upstream-wg
    restart: unless-stopped
    volumes:
      - ./wg1.conf:/etc/wireguard/wg1.conf
      - ./post-up.sh:/post-up.sh:ro
      - /lib/modules:/lib/modules:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.conf.all.rp_filter=0
      - net.ipv4.conf.default.rp_filter=0
    devices:
      - /dev/net/tun:/dev/net/tun
    ports:
      - "1:1/udp"
    command: >
      bash -lc " apt-get update && apt-get install -y wireguard-tools iptables
      iproute2 && wg-quick up wg1 && bash /post-up.sh && tail -f /dev/null "

  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:15.2.0
    container_name: wg-easy
    restart: unless-stopped
    volumes:
      - ./wg-easy:/etc/wireguard
      - /lib/modules:/lib/modules:ro
    network_mode: "service:upstream-wg"
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      INSECURE: true
      PORT: 80
      INIT_ENABLED: true
      INIT_USERNAME: ${WG_EASY_USERNAME}
      INIT_PASSWORD: ${WG_EASY_PASSWORD}
      INIT_HOST: 176.108.242.92
      INIT_PORT: 1
      INIT_IPV4_CIDR: 10.8.10.0/24
      INIT_DNS: 1.1.1.1,1.0.0.1
      WG_HOST: 176.108.242.92
      WG_PORT: 1
      WG_DEFAULT_ADDRESS: 10.8.10.x
      WG_DEFAULT_DNS: 1.1.1.1,1.0.0.1

  wg-easy-app:
    image: ghcr.io/merzzzl/wg-easy-app:latest
    restart: unless-stopped
    network_mode: "service:upstream-wg"
    depends_on:
      wg-easy:
        condition: service_started
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "8080"
      APP_MAIN_BOT_TOKEN: ${APP_MAIN_BOT_TOKEN}
      APP_ADMIN_USERNAME: ${APP_ADMIN_USERNAME}
      APP_MAX_TUNNELS: ${APP_MAX_TUNNELS}
      APP_DB_URL: /data/sqlite.db
      APP_WG_EASY_BASE_URL: http://upstream-wg:80
      APP_WG_EASY_USERNAME: ${WG_EASY_USERNAME}
      APP_WG_EASY_PASSWORD: ${WG_EASY_PASSWORD}
      APP_WG_EASY_INSECURE_TLS: "false"
      APP_MINI_APP_URL: https://${MINI_APP_DOMAIN}
    volumes:
      - ./wg-easy-app:/data

  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      - wg-easy-app
      - wg-easy
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      MINI_APP_DOMAIN: ${MINI_APP_DOMAIN}
      WG_EASY_DOMAIN: ${WG_EASY_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/data:/data
      - ./caddy/config:/config
